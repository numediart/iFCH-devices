repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi, jupyter ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      # args: [--diff]
      types_or: [ python, pyi, jupyter ]
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.6
    hooks:
    - id: insert-license
      name: insert-license (apps, GPL-3.0-only)
      types: [ python ]
      files: '^apps/'
      args:
        - --use-current-year
        - --license-filepath
        - .github/license-check/header_pre-commit_gpl.txt
    - id: insert-license
      name: insert-license (drivers/devices, Apache-2.0)
      types: [ python ]
      exclude: '^apps/'
      args:
        - --use-current-year
        - --license-filepath
        - .github/license-check/header_pre-commit.txt
    - id: insert-license
      files: '\.(c|h|cpp|hpp)$'
      args:
        - --use-current-year
        - --comment-style
        - //
        - --license-filepath
        - .github/license-check/header_pre-commit.txt
