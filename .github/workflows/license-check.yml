name: Check license headers
on:
  push:
    paths:
      - '**.py'
      - .github/workflows/license-check.yml
  pull_request:

jobs:
  check-license:
    runs-on: ubuntu-latest
    name: Check license headers
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check license headers
        uses: viperproject/check-license-header@v2
        with:
          path: .
          config: .github/license-check/config.json
