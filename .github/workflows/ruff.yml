name: Check formatting with ruff
on:
  push:
    paths:
      - '**.py'
      - '**.ipynb'
      - .github/workflows/ruff.yml
  pull_request:

jobs:
  check-ruff:
    runs-on: ubuntu-latest
    name: Check format
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Ruff check lint
        uses: astral-sh/ruff-action@v3
      - name: Ruff check format
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"
      - name: Ruff check imports
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --select I"
